apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: kube-prometheus-stack
  namespace: argocd
spec:
  project: default

  sources:

  # 🔹 Helm chart (vendor source)
  - repoURL: https://prometheus-community.github.io/helm-charts
    chart: kube-prometheus-stack
    targetRevision: 82.0.0
    helm:
      valueFiles:
        - $values/kubernetes/helm-values/kube-prometheus-stack/prom-values.yaml

  # 🔹 Your Git repo (values source)
  - repoURL: git@gitlab.com:gitops-project1/argocd-manifests.git
    targetRevision: main
    ref: values

  destination:
    server: https://kubernetes.default.svc
    namespace: monitoring

  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true